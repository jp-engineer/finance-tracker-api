[pytest]
env =
    MODE=test
    DELETE_DB=true
markers =
    unit: unit tests
    db: database tests
    schema: schema tests
    templates: template tests
    models: model tests
    utils: utility tests
    db_utils: database utility tests

    api: API endpoint tests
    api_e2e_testing: API end-to-end tests
    api_index: API index ('/') endpoint tests
    api_settings: API settings endpoint tests
